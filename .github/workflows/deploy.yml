name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/code/freelance_seejob_node
            git fetch origin main
            git reset --hard origin/main
            npm install --production
            /home/ubuntu/.npm-global/bin/pm2 restart user-back || /home/ubuntu/.npm-global/bin/pm2 start index.js --name user-back
            # Install a boot service so pm2 resurrects the app automatically after
            # any reboot (no more manual "kick the app" 502 step). Idempotent;
            # non-fatal so it can never block a deploy.
            sudo env PATH=$PATH:/usr/bin:/home/ubuntu/.npm-global/bin /home/ubuntu/.npm-global/bin/pm2 startup systemd -u ubuntu --hp /home/ubuntu || echo "pm2 startup setup skipped (non-fatal)"
            /home/ubuntu/.npm-global/bin/pm2 save
